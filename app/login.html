<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-container" class="auth-box">
        <h2>Account Login</h2>
        <form id="login-form">
            <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="off">
            <input type="email" id="login-email" placeholder="Enter your email address" required autocomplete="off">
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p class="toggle-text">New here? <a href="/signup">Create Account</a></p>
        <!-- NEW ADMIN PORTAL LINK ROUTE ENTRY -->
        <hr style="border: 0; border-top: 1px solid var(--bg-tertiary); margin: 1rem 0;">
        <p class="toggle-text">System Administrator? <a href="/admin" style="color: var(--accent); font-weight: bold;">Access Admin Portal</a></p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (res.ok) {
                window.location.href = '/chat';
            } else {
                alert(await res.text());
            }
        });
    </script>
</body>
</html>
