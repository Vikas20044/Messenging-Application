<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="signup-container" class="auth-box">
        <h2>Create Account</h2>
        <form id="signup-form">
            <input type="text" id="signup-username" placeholder="Choose a username" required autocomplete="off">
            <input type="email" id="signup-email" placeholder="Enter your email address" required autocomplete="off">
            <input type="password" id="signup-password" placeholder="Choose a secure password" required>
            <button type="submit">Register</button>
        </form>
        <p class="toggle-text">Already have an account? <a href="/login">Log In</a></p>
        <p class="toggle-text"><a href="/forgot-password">Forgot Password?</a></p>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signup-username').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;

            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (res.ok) {
                alert('Account registered successfully! Redirecting to login.');
                window.location.href = '/login';
            } else {
                alert(await res.text());
            }
        });
    </script>
</body>
</html>
