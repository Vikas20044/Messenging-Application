<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Time Messanging App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="signup-container" class="auth-box">
        <h2>Create Account</h2>
        <form id="signup-form">
            <input type="text" id="signup-username" placeholder="Choose a username" required autocomplete="off">
            <input type="email" id="signup-email" placeholder="Enter your email address" required autocomplete="off">
            <input type="password" id="signup-password" placeholder="Choose a secure password" required>
            <button type="submit">Register</button>
        </form>
        <p class="toggle-text">Already have an account? <a href="#" id="go-to-login">Log In</a></p>
        <p class="toggle-text"><a href="#" id="signup-to-forgot">Forgot Password?</a></p>
    </div>

    <div id="login-container" class="auth-box hidden">
        <h2>Account Login</h2>
        <form id="login-form">
            <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="off">
            <input type="email" id="login-email" placeholder="Enter your email address" required autocomplete="off">
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p class="toggle-text">New here? <a href="#" id="go-to-signup">Create Account</a></p>
    </div>

    <div id="forgot-container" class="auth-box hidden">
        <h2>Reset Password</h2>
        <form id="forgot-form">
            <input type="text" id="forgot-username" placeholder="Enter your username" required autocomplete="off">
            <input type="email" id="forgot-email" placeholder="Enter your email address" required autocomplete="off">
            <input type="password" id="forgot-new-password" placeholder="Enter new secure password" required>
            <button type="submit">Update Password</button>
        </form>
        <p class="toggle-text">Remembered password? <a href="#" id="forgot-to-login">Back to Login</a></p>
    </div>

    <div id="chat-container" class="chat-wrapper hidden">
        <header class="chat-header">
            <div class="channel-info">
                <h2># group chat</h2>
                <p id="user-display-tag"></p>
            </div>
            <div class="header-actions">
                <button id="new-chat-btn" class="action-btn secondary">New Chat</button>
                <button id="exit-chat-btn" class="action-btn danger">Exit Chat</button>
            </div>
        </header>

        <div id="message-history" class="message-pane"></div>

        <div class="input-bar">
            <form id="chat-form">
                <input type="text" id="msg-input" placeholder="Type a message..." required autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUsername = '';

        const signupContainer = document.getElementById('signup-container');
        const loginContainer = document.getElementById('login-container');
        const forgotContainer = document.getElementById('forgot-container');
        const chatContainer = document.getElementById('chat-container');

        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const forgotForm = document.getElementById('forgot-form');
        const chatForm = document.getElementById('chat-form');
        
        const msgInput = document.getElementById('msg-input');
        const messageHistory = document.getElementById('message-history');
        const userDisplayTag = document.getElementById('user-display-tag');
        const exitChatBtn = document.getElementById('exit-chat-btn');
        const newChatBtn = document.getElementById('new-chat-btn');

        document.getElementById('go-to-signup').addEventListener('click', () => switchState(signupContainer));
        document.getElementById('signup-to-forgot').addEventListener('click', () => switchState(forgotContainer));
        document.getElementById('go-to-login').addEventListener('click', () => switchState(loginContainer));
        document.getElementById('forgot-to-login').addEventListener('click', () => switchState(loginContainer));

        function switchState(targetView) {
            [signupContainer, loginContainer, forgotContainer, chatContainer].forEach(view => view.classList.add('hidden'));
            targetView.classList.remove('hidden');
        }

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signup-username').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;

            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (res.ok) {
                alert('Account registered successfully! Redirecting to login.');
                switchState(loginContainer);
            } else {
                alert(await res.text());
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (res.ok) {
                const data = await res.json();
                currentUsername = data.username;
                userDisplayTag.innerText = `Logged in as: @${currentUsername}`;
                switchState(chatContainer);
                scrollToBottom();
            } else {
                alert(await res.text());
            }
        });

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('forgot- username').value.trim();
            const email = document.getElementById('forgot-email').value.trim();
            const newPassword = document.getElementById('forgot-new-password').value;

            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, newPassword })
            });

            if (res.ok) {
                alert('Password reset successful. Please log in with your new credentials.');
                switchState(loginContainer);
            } else {
                alert(await res.text());
            }
        });

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (text && currentUsername) {
                socket.emit('chatMessage', { username: currentUsername, text: text });
                msgInput.value = '';
            }
        });

        exitChatBtn.addEventListener('click', async () => {
            await fetch('/api/logout');
            window.location.reload();
        });

        newChatBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to clear this entire chat history for everyone?")) {
                socket.emit('clearChat');
            }
        });

        socket.on('chatHistory', (history) => {
            messageHistory.innerHTML = '';
            history.forEach(msg => appendMessage(msg));
            scrollToBottom();
        });

        socket.on('message', (msg) => {
            appendMessage(msg);
            scrollToBottom();
        });

        socket.on('messageReadUpdate', (messageId) => {
            const ticks = document.getElementById(`ticks-${messageId}`);
            if (ticks) {
                ticks.classList.add('read');
            }
        });

        socket.on('chatCleared', () => {
            messageHistory.innerHTML = '';
        });

        function appendMessage(msg) {
            const isOutgoing = msg.username === currentUsername;
            const row = document.createElement('div');
            row.className = `message-row ${isOutgoing ? 'outgoing' : 'incoming'}`;
            
            const timeString = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            row.innerHTML = `
                <div class="message-bubble">
                    ${!isOutgoing ? `<div class="sender-title">${msg.username}</div>` : ''}
                    <div class="message-text">${msg.text}</div>
                </div>
                <div class="message-meta">
                    <span>${timeString}</span>
                    ${isOutgoing ? `<span id="ticks-${msg._id}" class="ticks ${msg.isRead ? 'read' : ''}">✓✓</span>` : ''}
                </div>
            `;

            messageHistory.appendChild(row);


            if (!isOutgoing && !msg.isRead) {
                socket.emit('markAsRead', msg._id);
            }
        }

        function scrollToBottom() {
            messageHistory.scrollTop = messageHistory.scrollHeight;
        }
    </script>
</body>
</html>
